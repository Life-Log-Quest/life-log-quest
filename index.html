<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ライフログクエスト Ver.15.0</title>
    <style>
        :root {
            --bg-color: #121214;
            --card-bg: #1e1e24;
            --text-color: #e0e0e6;
            --hp-color: #e53935;
            --mp-color: #1e88e5;
            --accent-color: #ffb300;
            
            --color-buff: #4caf50;
            --color-debuff: #9c27b0;
            --color-damage: #f44336;
            --color-trait: #ffeb3b;
            --color-normal: #b0bec5;
        }
        body {
            font-family: 'Courier New', Courier, monospace, sans-serif;
            background-color: var(--bg-color);
            color: var(--text-color);
            margin: 0;
            padding: 20px;
            display: flex;
            flex-direction: column;
            align-items: center;
        }
        .container {
            width: 100%;
            max-width: 600px;
            background: var(--card-bg);
            padding: 20px;
            border-radius: 12px;
            box-shadow: 0 4px 15px rgba(0,0,0,0.5);
            border: 2px solid #444;
        }
        h1, h2 {
            text-align: center;
            color: #fff;
            margin-top: 0;
            letter-spacing: 2px;
        }
        .subtitle {
            text-align: center;
            font-size: 0.9rem;
            color: #aaa;
            margin-bottom: 20px;
        }
        .disclaimer-box {
            background-color: #2a2215;
            border: 1px solid var(--accent-color);
            color: #ffd54f;
            padding: 10px;
            border-radius: 6px;
            font-size: 0.82rem;
            margin-bottom: 20px;
            line-height: 1.4;
            text-align: center;
        }
        .section-title {
            font-size: 1.1rem;
            color: var(--accent-color);
            border-bottom: 2px dashed var(--accent-color);
            padding-bottom: 5px;
            margin-top: 25px;
            margin-bottom: 15px;
        }
        .form-row {
            display: flex;
            gap: 15px;
            margin-bottom: 15px;
        }
        .form-group {
            flex: 1;
            display: flex;
            flex-direction: column;
        }
        label {
            margin-bottom: 5px;
            font-weight: bold;
            font-size: 0.9rem;
        }
        select, input {
            padding: 10px;
            border-radius: 6px;
            border: 1px solid #555;
            background-color: #2a2a32;
            color: #fff;
            box-sizing: border-box;
        }
        
        details {
            background-color: #16161a;
            border: 1px dashed #555;
            border-radius: 6px;
            padding: 10px;
            margin-top: 15px;
        }
        summary {
            cursor: pointer;
            font-weight: bold;
            color: var(--accent-color);
            padding: 5px;
            outline: none;
            user-select: none;
            font-size: 0.95rem;
        }
        .custom-badge {
            color: #ff5722;
            font-size: 0.85rem;
            margin-left: 5px;
            font-weight: bold;
        }
        
        .resistance-grid {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 10px;
            margin-top: 15px;
        }
        .resistance-group {
            display: flex;
            flex-direction: column;
        }
        
        .help-btn {
            background: #333;
            color: #fff;
            border: 1px solid #777;
            border-radius: 50%;
            width: 18px;
            height: 18px;
            font-size: 0.7rem;
            cursor: pointer;
            display: inline-flex;
            align-items: center;
            justify-content: center;
            margin-left: 5px;
            vertical-align: middle;
        }
        .event-row {
            display: flex;
            gap: 10px;
            margin-bottom: 10px;
            align-items: center;
        }
        .event-row input { flex: 1.5; }
        .event-row select { flex: 1; }
        
        .calc-btn {
            width: 100%;
            padding: 14px;
            background-color: var(--accent-color);
            color: #121214;
            border: none;
            border-radius: 6px;
            font-size: 1.1rem;
            cursor: pointer;
            font-weight: bold;
            margin-top: 20px;
        }
        .calc-btn:hover { opacity: 0.9; }

        #status-screen {
            margin-top: 25px;
            padding: 20px;
            background: #000;
            border: 2px solid #fff;
            border-radius: 8px;
            display: none;
        }
        .status-row { margin: 15px 0; }
        .bar-container {
            width: 100%;
            background-color: #333;
            height: 15px;
            border: 1px solid #fff;
            margin-top: 5px;
        }
        .bar { height: 100%; transition: width 0.5s ease; }
        .hp-bar { background-color: var(--hp-color); }
        .mp-bar { background-color: var(--mp-color); }
        
        .log-list {
            margin-top: 15px;
            padding-left: 20px;
            font-size: 0.9rem;
            list-style-type: '▶ ';
        }
        .log-buff { color: var(--color-buff); }
        .log-debuff { color: var(--color-debuff); }
        .log-damage { color: var(--color-damage); }
        .log-trait { color: var(--color-trait); }
        .log-normal { color: var(--color-normal); }
    </style>
</head>
<body onload="loadPlayerData()">

<div class="container">
    <h1>ライフログクエスト</h1>
    <div class="subtitle">
        — 1日をRPG化して、今日のHPを知ろう — 
        <span style="display:block; font-size:0.75rem; color:#ff5722; margin-top:5px; font-weight:bold; letter-spacing:1px;">[ Ver.1.0 β-TEST ]</span>
    </div>

    <div class="disclaimer-box">
        本アプリは体調をRPG風に可視化するエンタメ寄りの参考ツールです。<br>
        医療診断や治療の代替ではありません。体調不良時は医療機関を受診してください。
    </div>

    <div class="section-title">CHARACTER MAKING</div>
    <div class="form-row">
        <div class="form-group">
            <label>ニックネーム</label>
            <input type="text" id="player-name" placeholder="無名の旅人" oninput="savePlayerData()">
        </div>
    </div>
    <div class="form-row">
        <div class="form-group">
            <label>性別</label>
            <select id="gender" onchange="savePlayerData()">
                <option value="female" selected>女性</option>
                <option value="male">男性</option>
            </select>
        </div>
        <div class="form-group">
            <label>年代</label>
            <select id="age" onchange="savePlayerData()">
                <option value="10">10代</option>
                <option value="20">20代</option>
                <option value="30">30代</option>
                <option value="40" selected>40代</option>
                <option value="50">50代〜</option>
            </select>
        </div>
    </div>
    <div class="form-row">
        <div class="form-group">
            <label>身長 (cm)</label>
            <input type="number" id="height" placeholder="例: 160" oninput="savePlayerData()">
        </div>
        <div class="form-group">
            <label>体重 (kg)</label>
            <input type="number" id="weight" placeholder="例: 55" oninput="savePlayerData()">
        </div>
        <div class="form-group">
            <label>体型</label>
            <select id="body-type" onchange="savePlayerData()">
                <option value="slender">細身</option>
                <option value="normal" selected>標準</option>
                <option value="muscle">筋肉質</option>
                <option value="plump">ぽっちゃり</option>
            </select>
        </div>
    </div>

    <details>
        <summary>詳細設定（属性耐性のカスタム）<span id="badge-area" class="custom-badge"></span></summary>
        <div class="resistance-grid">
            <div class="resistance-group">
                <label>冷房（寒さ）耐性</label>
                <select id="res-cold" class="res-select" onchange="updateResistanceBadge(); savePlayerData();"><option value="good">得意</option><option value="normal" selected>ふつう</option><option value="bad">苦手</option></select>
            </div>
            <div class="resistance-group">
                <label>低気圧耐性</label>
                <select id="res-pressure" class="res-select" onchange="updateResistanceBadge(); savePlayerData();"><option value="good">得意</option><option value="normal" selected>ふつう</option><option value="bad">苦手</option></select>
            </div>
            <div class="resistance-group">
                <label>人混み耐性</label>
                <select id="res-crowd" class="res-select" onchange="updateResistanceBadge(); savePlayerData();"><option value="good">得意</option><option value="normal" selected>ふつう</option><option value="bad">苦手</option></select>
            </div>
            <div class="resistance-group">
                <label>三半規管耐性</label>
                <select id="res-ears" class="res-select" onchange="updateResistanceBadge(); savePlayerData();"><option value="good">得意</option><option value="normal" selected>ふつう</option><option value="bad">苦手</option></select>
            </div>
            <div class="resistance-group">
                <label>痛み耐性</label>
                <select id="res-pain" class="res-select" onchange="updateResistanceBadge(); savePlayerData();"><option value="good">得意</option><option value="normal" selected>ふつう</option><option value="bad">苦手</option></select>
            </div>
            <div class="resistance-group">
                <label>対人耐性</label>
                <select id="res-social" class="res-select" onchange="updateResistanceBadge(); savePlayerData();"><option value="good">得意</option><option value="normal" selected>ふつう</option><option value="bad">苦手</option></select>
            </div>
            <div class="resistance-group" style="grid-column: span 2;">
                <label>暑さ耐性</label>
                <select id="res-heat" class="res-select" onchange="updateResistanceBadge(); savePlayerData();"><option value="good">得意</option><option value="normal" selected>ふつう</option><option value="bad">苦手</option></select>
            </div>
        </div>
    </details>

    <div class="section-title">ENVIRONMENT & BUFF</div>
    <div class="form-row">
        <div class="form-group">
            <label>昨夜の睡眠</label>
            <select id="sleep-status">
                <option value="good">しっかり寝た（7時間以上）</option>
                <option value="normal" selected>ちょうどいい（6時間）</option>
                <option value="bad">不足（6時間未満）</option>
                <option value="very-bad">かなり不足（3時間以下）</option>
            </select>
        </div>
        <div class="form-group">
            <label>昨日の食事</label>
            <select id="food-status">
                <option value="perfect">十分（3食＋栄養〇）</option>
                <option value="normal" selected>普通</option>
                <option value="bad">不足（欠食気味）</option>
                <option value="unbalance">偏りあり</option>
            </select>
        </div>
    </div>
    <div class="form-row">
        <div class="form-group">
            <label>天候</label>
            <select id="weather">
                <option value="sunny" selected>晴れ</option>
                <option value="cloudy">曇り</option>
                <option value="rainy">雨</option>
                <option value="heavy-rain">豪雨</option>
                <option value="snow">雪</option>
            </select>
        </div>
        <div class="form-group">
            <label>体感温度</label>
            <select id="temp-feel">
                <option value="normal" selected>ちょうどいい</option>
                <option value="hot">暑い</option>
                <option value="cold">寒い</option>
            </select>
        </div>
    </div>

    <div class="section-title">DAILY QUESTS</div>
    <div id="event-list">
        <div class="event-row">
            <input type="text" placeholder="クエスト/イベント名" class="event-name" oninput="handleRowInput(this)">
            <select class="event-type">
                <option value="normal" selected>ふつう</option>
                <option value="super-fun">すごく楽しみ</option>
                <option value="fun">楽しみ</option>
                <option value="hate">嫌</option>
                <option value="super-hate">すごく嫌</option>
            </select>
        </div>
    </div>

    <button class="calc-btn" onclick="calculateStatus()">クエスト開始（ステータス算出）</button>

    <div id="status-screen">
        <h2>PARTY STATUS (予測値)</h2>
        <div id="display-name-area" style="font-size: 1.2rem; font-weight: bold; border-bottom: 1px solid #fff; padding-bottom: 5px;"></div>
        
        <div class="status-row">
            <div>
                <strong>HP</strong> <button class="help-btn" onclick="showHelp('hp')">?</button>: 
                <span id="hp-text">10000 / 10000</span>
            </div>
            <div class="bar-container"><div id="hp-bar" class="bar hp-bar"></div></div>
        </div>
        
        <div class="status-row">
            <div>
                <strong>MP</strong> <button class="help-btn" onclick="showHelp('mp')">?</button>: 
                <span id="mp-text">10000 / 10000</span>
            </div>
            <div class="bar-container"><div id="mp-bar" class="bar mp-bar"></div></div>
        </div>

        <div id="eval-text" style="color: #ffeb3b; font-weight: bold; margin-top: 15px; font-size: 0.95rem;"></div>
        <ul id="log-list" class="log-list"></ul>
    </div>
</div>

<script>
    function showHelp(type) {
        if (type === 'hp') {
            alert("【HP（ヒットポイント）】\n身体的耐久、体力、痛み耐性を表します。主に日常の行動や体格、気圧などで増減します。");
        } else if (type === 'mp') {
            alert("【MP（マジックパワー）】\n気力、集中力、メンタル余力を表します。ストレスや楽しいこと、睡眠状態によって大きく変動します。");
        }
    }

    function updateResistanceBadge() {
        const selects = document.querySelectorAll('.res-select');
        let customCount = 0;
        selects.forEach(select => {
            if (select.value !== 'normal') customCount++;
        });
        const badgeArea = document.getElementById('badge-area');
        badgeArea.innerText = customCount > 0 ? `【カスタム済み・${customCount}項目】` : '';
    }

    function savePlayerData() {
        const playerData = {
            playerName: document.getElementById('player-name').value,
            gender: document.getElementById('gender').value,
            age: document.getElementById('age').value,
            height: document.getElementById('height').value,
            weight: document.getElementById('weight').value,
            bodyType: document.getElementById('body-type').value,
            resCold: document.getElementById('res-cold').value,
            resPressure: document.getElementById('res-pressure').value,
            resCrowd: document.getElementById('res-crowd').value,
            resEars: document.getElementById('res-ears').value,
            resPain: document.getElementById('res-pain').value,
            resSocial: document.getElementById('res-social').value,
            resHeat: document.getElementById('res-heat').value,
        };
        localStorage.setItem('lifeLogQuestData', JSON.stringify(playerData));
    }

    function loadPlayerData() {
        const savedData = localStorage.getItem('lifeLogQuestData');
        if (savedData) {
            const data = JSON.parse(savedData);
            if(data.playerName) document.getElementById('player-name').value = data.playerName;
            if(data.gender) document.getElementById('gender').value = data.gender;
            if(data.age) document.getElementById('age').value = data.age;
            if(data.height) document.getElementById('height').value = data.height;
            if(data.weight) document.getElementById('weight').value = data.weight;
            if(data.bodyType) document.getElementById('body-type').value = data.bodyType;
            if(data.resCold) document.getElementById('res-cold').value = data.resCold;
            if(data.resPressure) document.getElementById('res-pressure').value = data.resPressure;
            if(data.resCrowd) document.getElementById('res-crowd').value = data.resCrowd;
            if(data.resEars) document.getElementById('res-ears').value = data.resEars;
            if(data.resPain) document.getElementById('res-pain').value = data.resPain;
            if(data.resSocial) document.getElementById('res-social').value = data.resSocial;
            if(data.resHeat) document.getElementById('res-heat').value = data.resHeat;
        }
        updateResistanceBadge();
    }

    function handleRowInput(inputElement) {
        const row = inputElement.parentElement;
        const container = document.getElementById('event-list');
        if (row === container.lastElementChild && inputElement.value.trim() !== "") {
            createNewRow();
        }
    }

    function createNewRow() {
        const container = document.getElementById('event-list');
        const newRow = document.createElement('div');
        newRow.className = 'event-row';
        newRow.innerHTML = `
            <input type="text" placeholder="クエスト/イベント名" class="event-name" oninput="handleRowInput(this)">
            <select class="event-type">
                <option value="normal" selected>ふつう</option>
                <option value="super-fun">すごく楽しみ</option>
                <option value="fun">楽しみ</option>
                <option value="hate">嫌</option>
                <option value="super-hate">すごく嫌</option>
            </select>
        `;
        container.appendChild(newRow);
    }

    function calculateStatus() {
        let maxHp = 10000;
        let maxMp = 10000;
        let logs = [];

        let baseDefense = 1.0; 

        const nameInput = document.getElementById('player-name').value.trim();
        const finalPlayerName = nameInput === "" ? "無名の旅人" : nameInput;

        const resCold = document.getElementById('res-cold').value;
        const resPressure = document.getElementById('res-pressure').value;
        const resCrowd = document.getElementById('res-crowd').value;
        const resEars = document.getElementById('res-ears').value;
        const resPain = document.getElementById('res-pain').value;
        const resSocial = document.getElementById('res-social').value;
        const resHeat = document.getElementById('res-heat').value;

        const age = document.getElementById('age').value;
        if (age === '30') { maxHp -= 500; maxMp -= 500; }
        if (age === '40') { maxHp -= 1500; maxMp -= 1500; logs.push({text: "【経年デバフ】40代の洗礼：基礎HP/MP上限に低下補正が適用されています。", type: "debuff"}); }
        if (age === '50') { maxHp -= 2500; maxMp -= 2500; logs.push({text: "【経年デバフ】50代の洗礼：基礎HP/MP上限に強めの低下補正が適用されています。", type: "debuff"}); }

        const height = parseFloat(document.getElementById('height').value) || 160;
        const weight = parseFloat(document.getElementById('weight').value) || 55;
        const bmi = weight / ((height / 100) * (height / 100));
        let bmiStatus = "normal";
        if (bmi < 18.5) { maxHp -= 1000; baseDefense += 0.15; bmiStatus = "low"; } 
        else if (bmi > 25) { maxHp -= 500; bmiStatus = "high"; }

        const bodyType = document.getElementById('body-type').value;
        if (bodyType === 'slender') {
            if (bmiStatus !== "low") { maxHp -= 500; baseDefense += 0.10; }
            logs.push({text: "【特性：軽量体型】身軽だが物理耐久が低下する傾向にあります。", type: "trait"});
        } else if (bodyType === 'muscle') {
            maxHp += 2000; baseDefense -= 0.10; 
            logs.push({text: "【特性：肉体装装甲】鍛え上げられた筋肉。最大HPが大幅に加算され、防御力が向上している模様です。", type: "trait"});
        } else if (bodyType === 'plump') {
            maxHp -= 500;
            logs.push({text: "【特性：重量体型】最大HPに微量のマイナス傾向があります。", type: "trait"});
        } else {
            logs.push({text: "【特性：標準体型】平均的な肉体バランスを維持しているようです。", type: "trait"});
        }

        const finalMaxHp = maxHp;
        const finalMaxMp = maxMp;

        let currentHp = finalMaxHp;
        let currentMp = finalMaxMp;

        const sleepStatus = document.getElementById('sleep-status').value;
        if (sleepStatus === 'good') {
            currentHp += 500; currentMp += 1500;
            logs.push({text: "【完全休息バフ】7時間以上の睡眠。心身の修復が万全な傾向にあります（HP+500, MP+1500）。", type: "buff"});
        } else if (sleepStatus === 'bad') {
            currentHp -= 1000; currentMp -= 1500;
            logs.push({text: "【睡眠不足デバフ】6時間未満の睡眠。精神的余裕が削られている可能性があります（HP-1000, MP-1500）。", type: "debuff"});
        } else if (sleepStatus === 'very-bad') {
            currentHp -= 2000; currentMp -= 3000;
            logs.push({text: "【深刻な不眠デバフ】3時間以下の睡眠。深刻なスタミナ低下と、強い精神ペナルティの兆候があります（HP-2000, MP-3000）。", type: "debuff"});
        } else {
            logs.push({text: "【睡眠確認】ちょうどいい睡眠量。基礎ステータスは安定している模様です。", type: "normal"});
        }

        const foodStatus = document.getElementById('food-status').value;
        if (foodStatus === 'perfect') {
            currentHp += 1000; currentMp += 500;
            logs.push({text: "【栄養充填バフ】昨日の食事が十分。蓄積されたエネルギーが本日の糧となっている模様です（HP+1000, MP+500）。", type: "buff"});
        } else if (foodStatus === 'bad') {
            currentHp -= 1500; currentMp -= 500;
            logs.push({text: "【エネルギー枯渇】昨日の食事が不足気味。フィジカルスタミナの低下に繋がっている可能性があります（HP-1500, MP-500）。", type: "debuff"});
        } else if (foodStatus === 'unbalance') {
            currentHp -= 500; currentMp -= 1000;
            baseDefense += 0.05; 
            logs.push({text: "【栄養失調デバフ】昨日の食事の偏り。本日の集中力の乱れや軽微な脆さの原因になる傾向があります（HP-500, MP-1000）。", type: "debuff"});
        } else {
            logs.push({text: "【食事確認】昨日、標準的な食事を摂取。エネルギーは通常通り供給されている模様です。", type: "normal"});
        }

        // --- 天候・気圧デバフロジック ---
        const weather = document.getElementById('weather').value;
        let pModifier = 1.0; 
        if (resPressure === 'good') { pModifier = 0.8; }
        if (resPressure === 'bad') { pModifier = 1.3; }

        if (weather === 'sunny') {
            logs.push({text: "【天候：晴れ】心地よい高気圧フィールド。環境デバフの影響はありません。", type: "buff"});
        } else if (weather === 'cloudy') {
            let hpLoss = Math.round(500 * pModifier); let mpLoss = Math.round(300 * pModifier);
            currentHp -= hpLoss; currentMp -= mpLoss;
            let note = resPressure !== 'normal' ? `（低気圧耐性連動：×${pModifier}）` : "";
            logs.push({text: `【天候：曇り】微弱な低気圧の影${note}。身体に重みを感じる傾向があります（HP-${hpLoss}, MP-${mpLoss}）。`, type: "debuff"});
        } else if (weather === 'rainy') {
            let hpLoss = Math.round(1500 * pModifier); let mpLoss = Math.round(1000 * pModifier);
            currentHp -= hpLoss; currentMp -= mpLoss;
            let note = resPressure !== 'normal' ? `（低気圧耐性連動：×${pModifier}）` : "";
            logs.push({text: `【天候：雨】低気圧のフィールド効果${note}。広範囲に気圧の呪いが直撃中（HP-${hpLoss}, MP-${mpLoss}）。`, type: "debuff"});
        } else if (weather === 'heavy-rain') {
            let hpLoss = Math.round(2500 * pModifier); let mpLoss = Math.round(2000 * pModifier);
            currentHp -= hpLoss; currentMp -= mpLoss;
            baseDefense *= 1.1; 
            let note = resPressure !== 'normal' ? `（低気圧耐性補正：×${pModifier}）` : "";
            logs.push({text: `【天候：豪雨】強力な低気圧の嵐${note}。気圧ダメージに加え、本日は防御力が10%低下（被ダメ1.1倍）する模様。`, type: "debuff"});
        } else if (weather === 'snow') {
            let hpLoss = Math.round(1500 * pModifier); let mpLoss = Math.round(1500 * pModifier);
            let coldModifier = 1.0;
            if (resCold === 'good') { coldModifier = 0.7; }
            if (resCold === 'bad') { coldModifier = 1.5; }
            hpLoss = Math.round(hpLoss * coldModifier); mpLoss = Math.round(mpLoss * coldModifier);
            currentHp -= hpLoss; currentMp -= mpLoss;
            let coldNote = resCold === 'bad' ? "（冷房・寒さ弱点により大ダメージ！）" : (resCold === 'good' ? "（寒さ耐性により軽減）" : "");
            logs.push({text: `【天候：雪】低気圧＋寒気の複合呪い${coldNote}。凍える環境が身心を蝕みます（HP-${hpLoss}, MP-${mpLoss}）。`, type: "debuff"});
        }

        // --- 🌡️ 体感温度デバフ＆耐性連動ロジック ---
        const tempFeel = document.getElementById('temp-feel').value;
        if (tempFeel === 'hot') {
            let tLossMp = 1000;
            if (resHeat === 'good') { tLossMp = Math.round(tLossMp * 0.5); logs.push({text: "【パッシブ：暑さ耐性】不快な熱気を半分遮断！", type: "buff"}); }
            if (resHeat === 'bad') { tLossMp = Math.round(tLossMp * 1.5); logs.push({text: "【属性弱点：熱気不適合】暑さによる衰弱が増幅！", type: "debuff"}); }
            currentMp -= tLossMp;
            logs.push({text: `【環境：暑い】持続的な熱ダメージ。思考リソースが奪われています。（MP-${tLossMp}）。`, type: "debuff"});
        } else if (tempFeel === 'cold') {
            let tLossHp = 1000;
            if (resCold === 'good') { tLossHp = Math.round(tLossHp * 0.5); logs.push({text: "【パッシブ：寒さ耐性】冷えによる消耗を半分遮断！", type: "buff"}); }
            if (resCold === 'bad') { tLossHp = Math.round(tLossHp * 1.5); logs.push({text: "【属性弱点：冷気不適合】極端な寒さによる肉体ダメージが増幅！", type: "debuff"}); }
            currentHp -= tLossHp;
            logs.push({text: `【環境：寒い】過酷な冷気フィールド。身体の強張りにより体力（HP）を消費（HP-${tLossHp}）。`, type: "debuff"});
        }

        let activeQuestCount = 0;

        const rows = document.querySelectorAll('.event-row');
        rows.forEach(row => {
            const name = row.querySelector('.event-name').value.trim();
            const type = row.querySelector('.event-type').value;

            if (name === "") return;
            activeQuestCount++; 

            let textModifier = 1.0; let matchedRes = "";
            if (name.includes("人混み") || name.includes("電車") || name.includes("混雑")) {
                if (resCrowd === 'good') textModifier = 0.8; if (resCrowd === 'bad') textModifier = 1.3; matchedRes = "人混み耐性";
            } else if (name.includes("対人") || name.includes("会議") || name.includes("仕事") || name.includes("人間関係")) {
                if (resSocial === 'good') textModifier = 0.8; if (resSocial === 'bad') textModifier = 1.3; matchedRes = "対人耐性";
            } else if (name.includes("冷房") || name.includes("寒い")) {
                if (resCold === 'good') textModifier = 0.8; if (resCold === 'bad') textModifier = 1.3; matchedRes = "冷房耐性";
            } else if (name.includes("暑い") || name.includes("夏")) {
                if (resHeat === 'good') textModifier = 0.8; if (resHeat === 'bad') textModifier = 1.3; matchedRes = "暑さ耐性";
            } else if (name.includes("乗り物") || name.includes("移動")) {
                if (resEars === 'good') textModifier = 0.8; if (resEars === 'bad') textModifier = 1.3; matchedRes = "三半規管耐性";
            } else if (name.includes("痛") || name.includes("凝り")) {
                if (resPain === 'good') textModifier = 0.8; if (resPain === 'bad') textModifier = 1.3; matchedRes = "痛み耐性";
            }

            let finalDef = baseDefense * textModifier;

            if (type === 'super-fun') {
                currentHp += 1000; currentMp += 3000;
                logs.push({text: `【至高の聖水】「${name}」への期待が最高潮！HP+1000、MP+3000の超大回復！`, type: "buff"});
            } else if (type === 'fun') {
                currentHp += 500; currentMp += 1500;
                logs.push({text: `【聖水】「${name}」の加護。HP+500、MP+1500の回復効果を得た模様。`, type: "buff"});
            } else if (type === 'hate') {
                let hpDam = Math.round(1500 * finalDef); let mpDam = Math.round(2000 * finalDef);
                currentHp -= hpDam; currentMp -= mpDam; let resLog = matchedRes ? `（${matchedRes}連動）` : "";
                logs.push({text: `【中ボス戦】「${name}」と交戦${resLog}。HPに${hpDam}、MPに${mpDam}の痛烈なダメージ。`, type: "damage"});
            } else if (type === 'super-hate') {
                let hpDam = Math.round(3000 * finalDef); let mpDam = Math.round(4500 * finalDef);
                currentHp -= hpDam; currentMp -= mpDam; let resLog = matchedRes ? `（${matchedRes}連動）` : "";
                logs.push({text: `【大ボス戦】「${name}」との決戦${resLog}！HPに${hpDam}、MPに${mpDam}の致命的な大ダメージを被った模様。`, type: "damage"});
            } else {
                let hpLoss = Math.round(500 * finalDef); currentHp -= hpLoss; currentMp -= 200;
                logs.push({text: `【日常戦】「${name}」を淡々と消化。HPを${hpLoss}、MPを200消費した模様。`, type: "normal"});
            }
        });

        if (activeQuestCount === 0) {
            logs.push({text: "【平穏日】今日は雑魚敵すら少なめです。この機会に回復を。", type: "buff"});
        }

        if (currentHp < 0) currentHp = 0; if (currentHp > finalMaxHp) currentHp = finalMaxHp;
        if (currentMp < 0) currentMp = 0; if (currentMp > finalMaxMp) currentMp = finalMaxMp;

        const hpPercent = (currentHp / finalMaxHp) * 100;
        const mpPercent = (currentMp / finalMaxMp) * 100;
        const lowestPercent = Math.min(hpPercent, mpPercent);

        let evalText = "";

        if (currentHp === 0 && currentMp === 0) {
            evalText = "☠️ 完全に戦闘不能（全滅）の予測です。宿屋（布団）へ直行し、コマンド入力を停止してください。";
        } else if (lowestPercent >= 90) {
            evalText = "✨ 絶好調です。今日はバフがよく乗っています。普段後回しにしがちなクエストを進めるのも良いでしょう。";
        } else if (lowestPercent >= 70) {
            evalText = "⚔️ 現在のところ、戦況は安定している模様です。多少の損耗は見られますが、十分行動可能です。ご自身のペースを保ちつつ進みましょう。";
        } else {
            if (lowestPercent >= 40) {
                evalText = "⚠️ じわじわ削られています。雑魚敵でも油断すると地味に痛い日です。省エネ運用を推奨します。";
            } else if (lowestPercent >= 20) {
                evalText = "🚨 危険域です。すでに複数のデバフを受けている可能性があります。深追いは非推奨です。";
            } else {
                evalText = "☠️ 瀕死状態です。宿屋や教会ではなく、現実の休息や医療機関が必要な可能性があります。";
            }

            if (mpPercent - hpPercent >= 15) {
                evalText += "<br><span style='color:#ff5722; font-size:0.85rem;'>【状況警告】身体の損耗が目立ちます。肉体労働系クエスト注意。</span>";
            } else if (hpPercent - mpPercent >= 15) {
                evalText += "<br><span style='color:#ff5722; font-size:0.85rem;'>【状況警告】気力が削られています。対人クエスト注意。</span>";
            }
        }

        document.getElementById('status-screen').style.display = 'block';
        document.getElementById('display-name-area').innerText = finalPlayerName; 
        document.getElementById('hp-text').innerText = `${Math.round(currentHp)} / ${finalMaxHp}`;
        document.getElementById('mp-text').innerText = `${Math.round(currentMp)} / ${finalMaxMp}`;
        document.getElementById('hp-bar').style.width = `${(currentHp / finalMaxHp) * 100}%`;
        document.getElementById('mp-bar').style.width = `${(currentMp / finalMaxMp) * 100}%`;
        document.getElementById('eval-text').innerHTML = evalText;

        const logListDiv = document.getElementById('log-list'); logListDiv.innerHTML = "";
        logs.forEach(log => {
            const li = document.createElement('li'); li.innerText = log.text;
            if (log.type === 'buff') li.className = 'log-buff';
            else if (log.type === 'debuff') li.className = 'log-debuff';
            else if (log.type === 'damage') li.className = 'log-damage';
            else if (log.type === 'trait') li.className = 'log-trait';
            else li.className = 'log-normal';
            logListDiv.appendChild(li);
        });
        document.getElementById('status-screen').scrollIntoView({ behavior: 'smooth' });
    }
</script>

</body>
